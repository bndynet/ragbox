<svg width="540" height="160" viewBox="0 0 540 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">RAGbox logo</title>
  <desc id="desc">RAGbox wordmark with a compact BNDY-colored mark and a connected 3:1:3 baseline under the RAG letters.</desc>
  <g aria-label="RAGbox mark" shape-rendering="crispEdges" transform="translate(24 44) scale(12)">
    <rect x="1" y="1" width="3" height="1" fill="#DF2025"/>
    <rect x="1" y="3" width="2" height="1" fill="#DF2025"/>
    <rect x="4" y="2" width="1" height="3" fill="#347DC2"/>
    <rect x="3" y="4" width="2" height="1" fill="#347DC2"/>
    <rect x="5" y="2" width="1" height="4" fill="#4BB847"/>
    <rect x="2" y="5" width="4" height="1" fill="#4BB847"/>
    <rect x="2" y="4" width="1" height="1" fill="#4BB847"/>
  </g>
  <text x="130" y="101" fill="#141414" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="64" font-weight="800">RAG<tspan fill="#4BB847">box</tspan></text>
  <rect x="130" y="110" width="60" height="6" fill="#DF2025"/>
  <rect x="190" y="110" width="20" height="6" fill="#347DC2"/>
  <rect x="210" y="110" width="60" height="6" fill="#4BB847"/>
</svg>
